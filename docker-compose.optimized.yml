name: responsible-ai-toolkit-optimized

# =============================================================================
# Optimized Docker Compose for Responsible AI Toolkit
# =============================================================================
# 
# PROFILE ORGANIZATION:
# 
# Core Services (no profile - always available):
#   - mongo: Shared MongoDB database
#
# Profile: ui
#   - admin: Admin API service
#   - backend: Backend API service
#   - mfe: Micro-frontend application
#   - shell: Main shell/UI application
#
# Profile: ml-ops
#   - model-detail: Model details and workbench
#   - reporting-tool: Report generation service
#
# Profile: explainability
#   - ai-explain: AI model explainability service
#
# Profile: fairness
#   - fairness: AI fairness testing and analysis
#
# Profile: privacy
#   - privacy: Privacy analysis tools
#
# Profile: llm
#   - llm-explain: LLM explainability service
#   - llm-benchmarking: LLM benchmarking and testing
#
# Profile: security
#   - security: Security scanning and analysis
#   - moderationlayer: Content moderation layer
#   - moderationmodel: Content moderation models
#
# Profile: storage
#   - file-storage: File storage and management service
#
# =============================================================================
# USAGE EXAMPLES:
# =============================================================================
#
# Start only core + UI:
#   docker compose -f docker-compose.optimized.yml --profile ui up -d
#
# Start UI + ML capabilities:
#   docker compose -f docker-compose.optimized.yml --profile ui --profile ml-ops --profile explainability --profile fairness up -d
#
# Start everything:
#   docker compose -f docker-compose.optimized.yml --profile ui --profile ml-ops --profile explainability --profile fairness --profile privacy --profile llm --profile security --profile storage up -d
#
# Stop all services:
#   docker compose -f docker-compose.optimized.yml down
#
# =============================================================================

services:
  # ===========================================================================
  # CORE INFRASTRUCTURE (Always Available)
  # ===========================================================================
  
  mongo:
    container_name: rai-mongo
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: RAI_Admin_DB
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./responsible-ai-admin/Initial DB setup:/seed:ro
      - ./responsible-ai-admin/responsible-ai-admin/mongo-init/import-data.sh:/docker-entrypoint-initdb.d/import-data.sh:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - rai-network

  # ===========================================================================
  # PROFILE: UI (User Interface Services)
  # ===========================================================================
  
  admin:
    container_name: rai-admin
    profiles: ["ui"]
    build:
      context: ./responsible-ai-admin/responsible-ai-admin
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app/src
    command: ["python3", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "30016", "--reload"]
    environment:
      DB_TYPE: mongo
      DB_NAME: RAI_Admin_DB
      MONGO_PATH: mongodb://mongo:27017/
      allow_origin: '["*"]'
      allow_method: '["GET","POST","OPTIONS","HEAD","DELETE","PATCH","UPDATE"]'
    volumes:
      - ./responsible-ai-admin/responsible-ai-admin:/app
    ports:
      - "30016:30016"
    networks:
      - rai-network
    restart: unless-stopped

  backend:
    container_name: rai-backend
    profiles: ["ui"]
    build:
      context: ./responsible-ai-backend/backend-rai
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app/src
    command: ["python3", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "30019", "--reload"]
    environment:
      DB_TYPE: mongo
      DB_NAME: raibackend
      MONGO_PATH: mongodb://mongo:27017/
      SECRET_KEY: your_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      TOKEN_URL: /token
      TELEMETRY_FLAG: "False"
      allow_origin: '["*"]'
      allow_methods: '["GET","POST","OPTIONS","HEAD","DELETE","PATCH","UPDATE"]'
    volumes:
      - ./responsible-ai-backend/backend-rai:/app
    ports:
      - "30019:30019"
    networks:
      - rai-network
    restart: unless-stopped

  mfe:
    container_name: rai-mfe
    profiles: ["ui"]
    build:
      context: ./responsible-ai-mfe
      dockerfile: Dockerfile
    depends_on:
      - admin
      - backend
    environment:
      HOMEFILEPATHURL: http://localhost:30055
      DICOMFILEPATHURL: http://localhost:30055
      MASTERURL: http://localhost:30016/api/v1/rai/admin/ConfigApi
      ENABLESEARCH: "true"
      ENABLEINTERPRET: "true"
      AUTHORITY_API: http://localhost:30019/v1/rai/backend/pageauthoritynew
      WEBSOCKET_URL: ws://localhost:5001
      AUTH_TOKEN: Bearer None
      NG_SERVE_CMD: ng serve --host 0.0.0.0 --port 30055 --disable-host-check
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./responsible-ai-mfe:/app
      - mfe_node_modules:/app/node_modules
    ports:
      - "30055:30055"
    networks:
      - rai-network
    restart: unless-stopped

  shell:
    container_name: rai-shell
    profiles: ["ui"]
    build:
      context: ./responsible-ai-shell
      dockerfile: Dockerfile
    depends_on:
      - admin
      - backend
      - mfe
    environment:
      SERVER_API_URL: http://backend:30019/v1/rai/backend
      FRONTEND_URL: http://localhost:30010
      ADMIN_URL: http://admin:30016
      LOGIN_USER_NAME: admin
      LOGIN_USER_CRED: admin
      MFE_URL: http://mfe:30055
      AZURE_CLIENTID: ""
      AZURE_AUTHORITY: ""
      AZURE_REDIRECTURI: ""
      SSO_BASED_LOGIN: "false"
      TELEMETRY_DASHBOARD: ""
      NG_SERVE_CMD: ng serve --host 0.0.0.0 --port 30010 --disable-host-check
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./responsible-ai-shell:/app
      - shell_node_modules:/app/node_modules
    ports:
      - "30010:30010"
    networks:
      - rai-network
    restart: unless-stopped

  # ===========================================================================
  # PROFILE: ML-OPS (ML Operations and Model Management)
  # ===========================================================================
  
  model-detail:
    container_name: rai-model-detail
    profiles: ["ml-ops"]
    build:
      context: ./responsible-ai-model-detail/workbench
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app/src
    command: ["python3", "main.py"]
    environment:
      DB_TYPE: mongo
      DB_NAME: rai_repository
      MONGO_PATH: mongodb://mongo:27017/
      allow_origin: '["*"]'
    volumes:
      - ./responsible-ai-model-detail/workbench:/app
    ports:
      - "30020:80"
    networks:
      - rai-network
    restart: unless-stopped

  reporting-tool:
    container_name: rai-reporting-tool
    profiles: ["ml-ops"]
    build:
      context: ./responsible-ai-reporting-tool/wrapper
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app/src
    command: ["python3", "main.py"]
    environment:
      DB_TYPE: mongo
      DB_NAME: rai_repository
      MONGO_PATH: mongodb://mongo:27017/
      allow_origin: '["*"]'
    volumes:
      - ./responsible-ai-reporting-tool/wrapper:/app
    ports:
      - "30021:80"
    networks:
      - rai-network
    restart: unless-stopped

  # ===========================================================================
  # PROFILE: EXPLAINABILITY (AI Model Explainability Services)
  # ===========================================================================
  
  ai-explain:
    container_name: rai-explain
    profiles: ["explainability"]
    build:
      context: ./responsible-ai-explain/responsible-ai-explain
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
      model-detail:
        condition: service_started
      reporting-tool:
        condition: service_started
    environment:
      RAI_EXPLAIN_DB: RAI_Explain_DB
      DB_NAME: rai_repository
      DB_TYPE: mongo
      MONGO_PATH: mongodb://mongo:27017/
      ALLOWED_ORIGINS: '["*"]'
      ACCESS_KEY: ABC
      SECRET_KEY: XYZ
      REPORT_URL: http://reporting-tool/v1/report/htmltopdfconversion
    volumes:
      - ./responsible-ai-explain/responsible-ai-explain:/app
    ports:
      - "8002:8002"
    networks:
      - rai-network
    restart: unless-stopped

  # ===========================================================================
  # PROFILE: FAIRNESS (AI Fairness Testing and Analysis)
  # ===========================================================================
  
  fairness:
    container_name: rai-fairness
    profiles: ["fairness"]
    build:
      context: ./responsible-ai-fairness/responsible-ai-fairness
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
      model-detail:
        condition: service_started
      reporting-tool:
        condition: service_started
    environment:
      DB_TYPE: mongo
      DB_NAME: rai_repository
      DB_NAME_WB: rai_repository
      MONGO_PATH: mongodb://mongo:27017/
      AUTH_TYPE: none
      allow_origin: '["*"]'
      allow_methods: '["GET","POST","OPTIONS","HEAD","DELETE","PATCH","UPDATE"]'
      content_security_policy: "default-src 'self'; img-src data: https:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net"
      cache_control: "no-cache; no-store; must-revalidate"
      XSS_header: "1; mode=block"
      Vary_header: "Origin"
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"
      Pragma: "no-cache"
      ACCESS_KEY: ABC
      SECRET_KEY: XYZ
    volumes:
      - ./responsible-ai-fairness/responsible-ai-fairness:/app
    ports:
      - "8000:8000"
    networks:
      - rai-network
    restart: unless-stopped

  # ===========================================================================
  # PROFILE: PRIVACY (Privacy Analysis Tools)
  # ===========================================================================
  
  privacy:
    container_name: rai-privacy
    profiles: ["privacy"]
    build:
      context: ./responsible-ai-privacy/responsible-ai-privacy
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app/src
    command: ["python3", "privacy_main.py"]
    environment:
      DB_TYPE: mongo
      DB_NAME: rai_repository
      MONGO_PATH: mongodb://mongo:27017/
    volumes:
      - ./responsible-ai-privacy/responsible-ai-privacy:/app
    ports:
      - "30002:30002"
    networks:
      - rai-network
    restart: unless-stopped

  # ===========================================================================
  # PROFILE: LLM (Large Language Model Services)
  # ===========================================================================
  
  llm-explain:
    container_name: rai-llm-explain
    profiles: ["llm"]
    build:
      context: ./responsible-ai-llm-explain/responsible-ai-llm-explain
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app/src
    command: ["python3", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]
    environment:
      RAI_LLM_EXPLAIN_DB: RAI_LLM_Explain_DB
      DB_NAME: rai_repository
      DB_TYPE: mongo
      MONGO_PATH: mongodb://mongo:27017/
      ALLOWED_ORIGINS: '["*"]'
      ACCESS_KEY: ABC
      SECRET_KEY: XYZ
    volumes:
      - ./responsible-ai-llm-explain/responsible-ai-llm-explain:/app
    ports:
      - "8003:8002"
    networks:
      - rai-network
    restart: unless-stopped

  llm-benchmarking:
    container_name: rai-llm-benchmarking
    profiles: ["llm"]
    build:
      context: ./responsible-ai-llm-benchmarking/responsible-ai-benchmarking
      dockerfile: Dockerfile
    working_dir: /app/src
    command: ["python3", "main_api.py"]
    environment:
      PORT: "8000"
      ALLOWED_ORIGINS: '["*"]'
    volumes:
      - ./responsible-ai-llm-benchmarking/responsible-ai-benchmarking:/app
    ports:
      - "30022:8000"
    networks:
      - rai-network
    restart: unless-stopped

  # ===========================================================================
  # PROFILE: SECURITY (Security and Content Moderation Services)
  # ===========================================================================
  
  security:
    container_name: rai-security
    profiles: ["security"]
    build:
      context: ./responsible-ai-security/wrapper
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app/app
    command: ["python3", "main.py"]
    environment:
      DB_TYPE: mongo
      DB_NAME: rai_repository
      MONGO_PATH: mongodb://mongo:27017/
      ALLOWED_ORIGINS: '["*"]'
    volumes:
      - ./responsible-ai-security/wrapper:/app
    ports:
      - "30023:80"
    networks:
      - rai-network
    restart: unless-stopped

  moderationlayer:
    container_name: rai-moderationlayer
    profiles: ["security"]
    build:
      context: ./responsible-ai-moderationlayer
      dockerfile: Dockerfile
    working_dir: /app/src
    command: ["python3", "main.py"]
    environment:
      PORT: "8000"
      THREADS: "6"
      CONNECTION_LIMIT: "500"
      CHANNEL_TIMEOUT: "120"
      ALLOWED_ORIGINS: '["*"]'
      MODERATIONMODEL_URL: http://moderationmodel:8000
    volumes:
      - ./responsible-ai-moderationlayer:/app
    ports:
      - "30024:8000"
    networks:
      - rai-network
    restart: unless-stopped

  moderationmodel:
    container_name: rai-moderationmodel
    profiles: ["security"]
    build:
      context: ./responsible-ai-moderationmodel
      dockerfile: Dockerfile
    working_dir: /app/src
    command: ["python3", "main_detoxify.py"]
    environment:
      PORT: "8000"
      THREADS: "1"
      CONNECTION_LIMIT: "500"
      CHANNEL_TIMEOUT: "120"
    volumes:
      - ./responsible-ai-moderationmodel:/app
      - moderation_models:/app/models
    ports:
      - "30025:8000"
    networks:
      - rai-network
    restart: unless-stopped

  # ===========================================================================
  # PROFILE: STORAGE (File Storage and Data Management)
  # ===========================================================================
  
  file-storage:
    container_name: rai-file-storage
    profiles: ["storage"]
    build:
      context: ./responsible-ai-file-storage
      dockerfile: Dockerfile
    working_dir: /app/src
    command: ["python3", "main.py"]
    environment:
      PORT: "8000"
      ALLOWED_ORIGINS: '["*"]'
      STORAGE_PATH: /app/storage
    volumes:
      - ./responsible-ai-file-storage:/app
      - file_storage_data:/app/storage
    ports:
      - "30026:8000"
    networks:
      - rai-network
    restart: unless-stopped

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  mongo_data:
    name: rai-mongo-data
  mfe_node_modules:
    name: rai-mfe-node-modules
  shell_node_modules:
    name: rai-shell-node-modules
  moderation_models:
    name: rai-moderation-models
  file_storage_data:
    name: rai-file-storage-data

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  rai-network:
    name: rai-network
    driver: bridge
